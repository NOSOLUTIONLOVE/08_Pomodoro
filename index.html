<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pomodoro — 专注番茄钟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --coral: #FF6B6B;
      --coral-light: #FFB4A2;
      --cream: #FFF8F0;
      --cream-dark: #F5EDE3;
      --ink: #1A1614;
      --ink-muted: #7A6F68;
      --ink-faint: #C4B8AD;
      --surface: rgba(255, 248, 240, 0.06);
      --border: rgba(255, 107, 107, 0.15);
      --radius: 24px;
      --radius-sm: 12px;
      --font-display: 'Inter', -apple-system, system-ui, sans-serif;
      --mode-accent: var(--coral);
      --mode-accent-light: var(--coral-light);
      --mode-accent-glow: rgba(255, 107, 107, 0.38);
      --digit-shatter-ease: cubic-bezier(0.12, 0.82, 0.18, 1);
      --digit-suspend-ease: cubic-bezier(0.45, 0, 0.55, 1);
      --digit-reform-ease: cubic-bezier(0.7, 0, 0.16, 1);

      --focus-dur: 25;
      --short-dur: 5;
      --long-dur: 15;
      --pomodoros-before-long: 4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--cream);
      font-family: var(--font-display);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient {
      position: absolute;
      inset: -50%;
      background: radial-gradient(ellipse at 50% 60%, #3D1A1A 0%, #1A0F0F 40%, #0D0808 100%);
      transition: background 2s ease;
    }

    .bg-gradient.progress-0 { background: radial-gradient(ellipse at 50% 60%, #3D1A1A 0%, #1A0F0F 40%, #0D0808 100%); }
    .bg-gradient.progress-25 { background: radial-gradient(ellipse at 50% 60%, #4A1E1E 0%, #211212 40%, #0F0A0A 100%); }
    .bg-gradient.progress-50 { background: radial-gradient(ellipse at 50% 60%, #5A2222 0%, #271515 45%, #0E0A0A 100%); }
    .bg-gradient.progress-75 { background: radial-gradient(ellipse at 50% 60%, #6B2626 0%, #2D1818 50%, #0F0A0A 100%); }
    .bg-gradient.progress-100 { background: radial-gradient(ellipse at 50% 60%, #7A2A2A 0%, #331A1A 55%, #100808 100%); }
    .bg-gradient.break-mode { background: radial-gradient(ellipse at 50% 60%, #1A2E1A 0%, #0F1A0F 40%, #080D08 100%); }
    .bg-gradient.long-break { background: radial-gradient(ellipse at 50% 60%, #1A1A3D 0%, #0F0F21 40%, #080810 100%); }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--coral-light);
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.4; }
      80% { opacity: 0.4; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .timer-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .mode-tabs {
      position: relative;
      display: flex;
      gap: 4px;
      background: rgba(255, 248, 240, 0.06);
      border: 1px solid rgba(255, 248, 240, 0.08);
      border-radius: 16px;
      padding: 4px;
    }

    .mode-tab-indicator {
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 0;
      width: 0;
      border-radius: 12px;
      background: var(--mode-accent);
      box-shadow: 0 4px 16px var(--mode-accent-glow);
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), width 0.28s cubic-bezier(0.16, 1, 0.3, 1), background 0.28s ease, box-shadow 0.28s ease;
      pointer-events: none;
      z-index: 0;
    }

    .mode-tab {
      position: relative;
      z-index: 1;
      padding: 10px 24px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .mode-tab:hover { color: var(--cream); }

    .mode-tab.active {
      color: var(--cream);
    }

    .ring-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      overflow: visible;
      animation: breathe 4s ease-in-out infinite;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(255, 248, 240, 0.08);
      stroke-width: 6;
    }

    .ring-fill {
      fill: none;
      stroke: var(--coral);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
      filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.68)) drop-shadow(0 0 26px rgba(255, 107, 107, 0.36));
    }

    .ring-fill.break {
      stroke: #7CFFB2;
      filter: drop-shadow(0 0 10px rgba(124, 255, 178, 0.72)) drop-shadow(0 0 30px rgba(124, 255, 178, 0.42));
    }

    .ring-fill.long-break {
      stroke: #7EA9FF;
      filter: drop-shadow(0 0 10px rgba(126, 169, 255, 0.72)) drop-shadow(0 0 30px rgba(126, 169, 255, 0.42));
    }

    .timer-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .timer-time {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 68px;
      font-weight: 300;
      letter-spacing: -0.04em;
      color: var(--cream);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 220px;
      text-align: center;
    }

    .timer-char {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.66em;
      min-height: 1em;
      transition: filter 0.24s ease, opacity 0.24s ease, text-shadow 0.24s ease;
    }

    .timer-char-separator {
      width: 0.34em;
    }

    .timer-time.morphing .timer-char.morphing {
      animation: digit-morph 0.58s var(--digit-shatter-ease);
      text-shadow: 0 0 14px rgba(255, 248, 240, 0.3);
    }

    .timer-time.simple-blur {
      animation: timer-simple-blur 0.18s linear;
    }

    .digit-dissolve-field {
      position: absolute;
      width: 68px;
      height: 82px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
      color: var(--cream);
    }

    .digit-particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
      box-shadow: 0 0 8px currentColor;
      animation: digit-particle-morph 0.62s var(--digit-shatter-ease) forwards;
    }

    @keyframes digit-morph {
      0% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
        animation-timing-function: var(--digit-shatter-ease);
      }
      24% {
        opacity: 0.18;
        filter: blur(8px);
        transform: scale(0.96);
        animation-timing-function: var(--digit-suspend-ease);
      }
      64% {
        opacity: 0.28;
        filter: blur(5px);
        transform: scale(1.02);
        animation-timing-function: var(--digit-reform-ease);
      }
      100% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
      }
    }

    @keyframes timer-simple-blur {
      0% { opacity: 1; filter: blur(0); }
      50% { opacity: 0.34; filter: blur(5px); }
      100% { opacity: 1; filter: blur(0); }
    }

    @keyframes digit-particle-morph {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
        animation-timing-function: var(--digit-shatter-ease);
      }
      24% {
        opacity: 0.9;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.08);
        animation-timing-function: var(--digit-suspend-ease);
      }
      64% {
        opacity: 0.64;
        transform: translate(calc(-50% + var(--x-mid)), calc(-50% + var(--y-mid))) scale(0.86);
        animation-timing-function: var(--digit-reform-ease);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.35);
      }
    }

    .timer-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .pomo-dots {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pomo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 248, 240, 0.15);
      transition: all 0.3s ease;
    }

    .pomo-dot.filled {
      background: var(--coral);
      box-shadow: 0 0 8px rgba(255, 107, 107, 0.6);
    }

    .pomo-dots-label {
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      margin-left: 4px;
    }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 36px;
      border-radius: 100px;
      border: none;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--mode-accent);
      color: var(--cream);
      box-shadow: 0 8px 32px var(--mode-accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px var(--mode-accent-glow);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--ink-muted);
      border: 1px solid rgba(255, 248, 240, 0.12);
    }

    .btn-ghost:hover {
      color: var(--cream);
      border-color: rgba(255, 248, 240, 0.25);
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 248, 240, 0.06);
      border: 1px solid rgba(255, 248, 240, 0.08);
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-icon:hover { color: var(--cream); border-color: rgba(255, 248, 240, 0.2); }

    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      height: 100%;
      background: rgba(26, 22, 20, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255, 248, 240, 0.08);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 40px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .settings-panel.open { transform: translateX(0); }

    .settings-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255, 248, 240, 0.06);
    }

    .settings-item-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--cream);
    }

    .settings-item-desc {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .settings-input {
      width: 80px;
      background: rgba(255, 248, 240, 0.06);
      border: 1px solid rgba(255, 248, 240, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--cream);
      font-family: var(--font-display);
      font-size: 14px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings-input:focus { border-color: var(--coral); }

    .settings-stepper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stepper-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255, 248, 240, 0.1);
      background: rgba(255, 248, 240, 0.05);
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .stepper-btn:hover {
      color: var(--cream);
      border-color: rgba(255, 248, 240, 0.22);
      background: rgba(255, 248, 240, 0.08);
    }

    .stepper-btn:active {
      transform: scale(0.94);
      color: var(--coral-light);
    }

    .settings-stepper .settings-input {
      width: 68px;
      height: 38px;
      padding: 8px 10px;
      cursor: text;
    }

    .settings-toggle {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .settings-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-track {
      position: relative;
      width: 54px;
      height: 30px;
      border-radius: 100px;
      border: 1px solid rgba(255, 248, 240, 0.1);
      background: rgba(255, 248, 240, 0.08);
      cursor: pointer;
      transition: background 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--cream-dark);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      transition: transform 0.24s cubic-bezier(0.16, 1, 0.3, 1), background 0.24s ease;
    }

    .settings-toggle input:checked + .toggle-track {
      background: var(--mode-accent);
      border-color: transparent;
      box-shadow: 0 0 18px var(--mode-accent-glow);
    }

    .settings-toggle input:checked + .toggle-track::after {
      transform: translateX(24px);
      background: var(--cream);
    }

    .settings-source {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
      color: rgba(196, 184, 173, 0.46);
      font-size: 10px;
      line-height: 1.5;
      letter-spacing: 0.08em;
    }

    .settings-source-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      color: rgba(196, 184, 173, 0.58);
      text-decoration: none;
      transition: color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .settings-source-link:hover {
      color: var(--cream);
      background: rgba(255, 248, 240, 0.06);
      transform: translateY(-1px);
    }

    .settings-source-icon {
      width: 14px;
      height: 14px;
      display: block;
    }

    .settings-close {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 248, 240, 0.06);
      border: 1px solid rgba(255, 248, 240, 0.08);
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }

    .settings-close:hover { color: var(--cream); }

    .stats-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      height: 100%;
      background: rgba(26, 22, 20, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255, 248, 240, 0.08);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 40px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .stats-drawer.open { transform: translateX(0); }

    .stats-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .stats-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 248, 240, 0.06);
      border: 1px solid rgba(255, 248, 240, 0.08);
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
    }

    .stats-close:hover { color: var(--cream); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-card {
      background: rgba(255, 248, 240, 0.04);
      border: 1px solid rgba(255, 248, 240, 0.06);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-card-value {
      font-size: 32px;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: -0.03em;
    }

    .stat-card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .focus-curve {
      background: rgba(255, 248, 240, 0.04);
      border: 1px solid rgba(255, 248, 240, 0.06);
      border-radius: 16px;
      padding: 20px;
    }

    .focus-curve-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 16px;
    }

    .focus-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 80px;
    }

    .focus-bar {
      flex: 1;
      background: rgba(255, 107, 107, 0.2);
      border-radius: 3px 3px 0 0;
      transition: all 0.3s;
      min-height: 4px;
    }

    .focus-bar.active { background: var(--coral); box-shadow: 0 0 8px rgba(255, 107, 107, 0.4); }
    .focus-bar.break { background: rgba(120, 196, 143, 0.4); }
    .focus-bar.long-break { background: rgba(139, 164, 232, 0.4); }

    .streak-heatmap {
      background: rgba(255, 248, 240, 0.04);
      border: 1px solid rgba(255, 248, 240, 0.06);
      border-radius: 16px;
      padding: 20px;
    }

    .streak-heatmap-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 16px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      background: rgba(255, 248, 240, 0.06);
      transition: all 0.2s;
    }

    .heatmap-cell.l1 { background: rgba(255, 107, 107, 0.2); }
    .heatmap-cell.l2 { background: rgba(255, 107, 107, 0.4); }
    .heatmap-cell.l3 { background: rgba(255, 107, 107, 0.6); }
    .heatmap-cell.l4 { background: var(--coral); box-shadow: 0 0 6px rgba(255, 107, 107, 0.4); }

    .heatmap-months {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 9px;
      color: var(--ink-faint);
      letter-spacing: 0.05em;
    }

    .tomato-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 248, 240, 0.04);
      border: 1px solid rgba(255, 248, 240, 0.06);
      border-radius: 16px;
    }

    .tomato-ring-svg {
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }

    .tomato-ring-track {
      fill: none;
      stroke: rgba(255, 248, 240, 0.08);
      stroke-width: 8;
    }

    .tomato-ring-fill {
      fill: none;
      stroke: var(--coral);
      stroke-width: 8;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(255, 107, 107, 0.4));
    }

    .tomato-ring-label {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tomato-ring-value {
      font-size: 24px;
      font-weight: 300;
      color: var(--cream);
    }

    .tomato-ring-text {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .time-dist {
      background: rgba(255, 248, 240, 0.04);
      border: 1px solid rgba(255, 248, 240, 0.06);
      border-radius: 16px;
      padding: 20px;
    }

    .time-dist-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 16px;
    }

    .time-dist-grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
    }

    .time-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      background: rgba(255, 248, 240, 0.06);
    }

    .time-cell.l1 { background: rgba(255, 107, 107, 0.25); }
    .time-cell.l2 { background: rgba(255, 107, 107, 0.45); }
    .time-cell.l3 { background: rgba(255, 107, 107, 0.65); }
    .time-cell.l4 { background: var(--coral); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .overlay.active { opacity: 1; pointer-events: auto; }

    .reset-btn {
      font-size: 11px;
      color: var(--ink-faint);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 8px;
      transition: color 0.2s;
    }

    .reset-btn:hover { color: var(--cream); }

    .focus-indicator {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--coral);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 50;
    }

    .focus-indicator.active { opacity: 1; }
    .focus-indicator.break { color: #78C48F; }
    .focus-indicator.long-break { color: #8BA4E8; }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255, 248, 240, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 248, 240, 0.1);
      border-radius: 100px;
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 500;
      color: var(--cream);
      z-index: 300;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .ring-wrap { width: 280px; height: 280px; }
      .timer-time { font-size: 54px; }
      .stats-drawer, .settings-panel { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .timer-time.morphing .timer-char.morphing,
      .digit-particle {
        animation: none;
      }

      .digit-dissolve-field {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 160;
    const TOMATO_CIRC = 2 * Math.PI * 50;

    let state = {
      mode: 'focus',
      running: false,
      timeLeft: 25 * 60,
      totalTime: 25 * 60,
      completedPomodoros: 0,
      pomodorosToday: 0,
      dailyCurve: [],
      history: [],
      settings: { focus: 25, short: 5, long: 15, pomodorosBeforeLong: 4, particles: true }
    };

    let interval = null;

    function loadState() {
      try {
        const saved = localStorage.getItem('pomodoro-state');
        if (saved) {
          const parsed = JSON.parse(saved);
          state.settings = { ...state.settings, ...(parsed.settings || {}) };
          state.completedPomodoros = parsed.completedPomodoros || 0;
          state.pomodorosToday = parsed.pomodorosToday || 0;
          state.dailyCurve = parsed.dailyCurve || [];
          state.history = parsed.history || [];
          const lastDate = parsed.lastDate;
          const today = new Date().toDateString();
          if (lastDate !== today) {
            if (state.pomodorosToday > 0 && lastDate) {
              const yesterday = new Date(lastDate);
              const dateStr = toLocalDateStr(yesterday);
              for (let i = 0; i < state.pomodorosToday; i++) {
                state.history.push({ date: dateStr, hour: 12, duration: 25 });
              }
            }
            state.pomodorosToday = 0;
            state.dailyCurve = [];
          }
        }
      } catch(e) {}
    }

    function saveState() {
      try {
        const data = {
          settings: state.settings,
          completedPomodoros: state.completedPomodoros,
          pomodorosToday: state.pomodorosToday,
          dailyCurve: state.dailyCurve,
          lastDate: new Date().toDateString(),
          history: state.history || []
        };
        localStorage.setItem('pomodoro-state', JSON.stringify(data));
      } catch(e) {}
    }

    const $display = document.getElementById('timerDisplay');
    const $ringFill = document.getElementById('ringFill');
    const $bgGradient = document.getElementById('bgGradient');
    const $focusIndicator = document.getElementById('focusIndicator');
    const $timerLabel = document.getElementById('timerLabel');
    const $btnStart = document.getElementById('btnStart');
    const $btnReset = document.getElementById('btnReset');
    const $btnSettings = document.getElementById('btnSettings');
    const $btnStats = document.getElementById('btnStats');
    const $settingsPanel = document.getElementById('settingsPanel');
    const $statsDrawer = document.getElementById('statsDrawer');
    const $overlay = document.getElementById('overlay');
    const $toast = document.getElementById('toast');
    const $modeTabs = document.querySelector('.mode-tabs');
    const $modeIndicator = document.querySelector('.mode-tab-indicator');
    const $inputParticles = document.getElementById('inputParticles');

    const SETTING_CONTROLS = {
      inputFocus: { key: 'focus', min: 1, max: 90 },
      inputShort: { key: 'short', min: 1, max: 30 },
      inputLong: { key: 'long', min: 1, max: 60 },
      inputPomodoros: { key: 'pomodorosBeforeLong', min: 2, max: 10 }
    };

    const SETTING_TO_MODE = {
      inputFocus: 'focus',
      inputShort: 'short',
      inputLong: 'long'
    };

    const DURATION_RESET_CONFIRM = '修改时长将从头开始计时，确定继续吗？';

    const TIMER_PARTICLE_COLORS = {
      focus: '#FFB4A2',
      short: '#7CFFB2',
      long: '#7EA9FF'
    };

    const MODE_THEMES = {
      focus: {
        accent: '#FF6B6B',
        light: '#FFB4A2',
        glow: 'rgba(255, 107, 107, 0.38)'
      },
      short: {
        accent: '#7CFFB2',
        light: '#C4FFD9',
        glow: 'rgba(124, 255, 178, 0.38)'
      },
      long: {
        accent: '#7EA9FF',
        light: '#C7D8FF',
        glow: 'rgba(126, 169, 255, 0.38)'
      }
    };

    let stepperHold = null;
    let timerTextTransition = null;
    let currentTimerText = '';

    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = Math.random() * 15 + 's';
        p.style.width = (4 + Math.random() * 8) + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
      }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function applyModeTheme(mode) {
      const theme = MODE_THEMES[mode] || MODE_THEMES.focus;
      document.documentElement.style.setProperty('--mode-accent', theme.accent);
      document.documentElement.style.setProperty('--mode-accent-light', theme.light);
      document.documentElement.style.setProperty('--mode-accent-glow', theme.glow);
    }

    function renderTimerChars(text, morphIndices = []) {
      const chars = Array.from(text);
      $display.innerHTML = '';
      chars.forEach((char, index) => {
        const span = document.createElement('span');
        span.className = 'timer-char' + (char === ':' ? ' timer-char-separator' : '');
        if (morphIndices.includes(index)) span.classList.add('morphing');
        span.dataset.charIndex = index;
        span.textContent = char;
        $display.appendChild(span);
      });
      currentTimerText = text;
    }

    function clearDigitDissolveFields() {
      document.querySelectorAll('.digit-dissolve-field').forEach(field => field.remove());
    }

    function createDigitDissolveParticles(charEl, index) {
      const containerRect = $display.parentElement.getBoundingClientRect();
      const charRect = charEl.getBoundingClientRect();
      const particleCount = Math.floor(randomBetween(28, 37));
      const field = document.createElement('div');
      field.className = 'digit-dissolve-field';
      field.dataset.charIndex = index;
      field.style.left = (charRect.left + charRect.width / 2 - containerRect.left) + 'px';
      field.style.top = (charRect.top + charRect.height / 2 - containerRect.top) + 'px';
      field.style.color = TIMER_PARTICLE_COLORS[state.mode] || TIMER_PARTICLE_COLORS.focus;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('span');
        const angle = randomBetween(0, Math.PI * 2);
        const distance = randomBetween(10, 34);
        const squash = randomBetween(0.72, 1.22);
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance * squash;
        const size = randomBetween(2, 5);
        particle.className = 'digit-particle';
        particle.style.width = size.toFixed(1) + 'px';
        particle.style.height = size.toFixed(1) + 'px';
        particle.style.opacity = randomBetween(0.55, 0.95).toFixed(2);
        particle.style.setProperty('--x', x.toFixed(1) + 'px');
        particle.style.setProperty('--y', y.toFixed(1) + 'px');
        particle.style.setProperty('--x-mid', (x * randomBetween(0.42, 0.78)).toFixed(1) + 'px');
        particle.style.setProperty('--y-mid', (y * randomBetween(0.42, 0.78)).toFixed(1) + 'px');
        particle.style.animationDelay = randomBetween(0, 90).toFixed(0) + 'ms';
        field.appendChild(particle);
      }

      $display.parentElement.appendChild(field);
      setTimeout(() => field.remove(), 680);
    }

    function setTimerText(nextText, animate = false) {
      const oldText = currentTimerText || $display.textContent;
      if (oldText === nextText && !animate) return;

      if (timerTextTransition) {
        clearTimeout(timerTextTransition.swap);
        clearTimeout(timerTextTransition.done);
      }

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!animate || reduceMotion) {
        renderTimerChars(nextText);
        $display.classList.remove('morphing');
        $display.classList.remove('simple-blur');
        clearDigitDissolveFields();
        timerTextTransition = null;
        return;
      }

      if (state.settings.particles === false) {
        clearDigitDissolveFields();
        $display.classList.remove('morphing');
        $display.querySelectorAll('.timer-char.morphing').forEach(char => char.classList.remove('morphing'));
        $display.classList.remove('simple-blur');
        void $display.offsetWidth;
        $display.classList.add('simple-blur');
        timerTextTransition = {
          swap: setTimeout(() => {
            renderTimerChars(nextText);
          }, 90),
          done: setTimeout(() => {
            $display.classList.remove('simple-blur');
            timerTextTransition = null;
          }, 210)
        };
        return;
      }

      if (!$display.querySelector('.timer-char')) {
        renderTimerChars(oldText);
      }

      const changedIndices = Array.from(nextText).reduce((indices, char, index) => {
        if (char !== oldText[index]) indices.push(index);
        return indices;
      }, []);

      if (changedIndices.length === 0) {
        renderTimerChars(nextText);
        return;
      }

      clearDigitDissolveFields();
      $display.classList.add('morphing');
      changedIndices.forEach(index => {
        const charEl = $display.querySelector('[data-char-index="' + index + '"]');
        if (!charEl) return;
        charEl.classList.add('morphing');
        if (state.settings.particles) {
          createDigitDissolveParticles(charEl, index);
        }
      });

      timerTextTransition = {
        swap: setTimeout(() => {
          renderTimerChars(nextText, changedIndices);
        }, 170),
        done: setTimeout(() => {
          $display.classList.remove('morphing');
          $display.querySelectorAll('.timer-char.morphing').forEach(char => char.classList.remove('morphing'));
          clearDigitDissolveFields();
          timerTextTransition = null;
        }, 620)
      };
    }

    function updateDisplay(animateTimer = false) {
      const m = Math.floor(state.timeLeft / 60);
      const s = state.timeLeft % 60;
      setTimerText(formatTime(state.timeLeft), animateTimer);
      const progress = state.timeLeft / state.totalTime;
      const offset = CIRCUMFERENCE * (1 - progress);
      $ringFill.style.strokeDashoffset = offset;
      const progPct = Math.round((1 - progress) * 100);
      if (state.mode === 'focus') {
        if (progPct < 25) $bgGradient.className = 'bg-gradient progress-0';
        else if (progPct < 50) $bgGradient.className = 'bg-gradient progress-25';
        else if (progPct < 75) $bgGradient.className = 'bg-gradient progress-50';
        else $bgGradient.className = 'bg-gradient progress-75';
      } else if (state.mode === 'short') {
        $bgGradient.className = 'bg-gradient break-mode';
      } else {
        $bgGradient.className = 'bg-gradient long-break';
      }
      $ringFill.setAttribute('class', 'ring-fill' + (state.mode === 'short' ? ' break' : state.mode === 'long' ? ' long-break' : ''));
    }

    function positionModeIndicator() {
      const activeTab = $modeTabs.querySelector('.mode-tab.active');
      if (!activeTab || !$modeIndicator) return;
      $modeIndicator.style.width = activeTab.offsetWidth + 'px';
      $modeIndicator.style.transform = 'translateX(' + activeTab.offsetLeft + 'px)';
    }

    function updateModeTabs(mode) {
      applyModeTheme(mode);
      $modeTabs.dataset.currentMode = mode;
      document.querySelectorAll('.mode-tab').forEach(tab => {
        const active = tab.dataset.mode === mode;
        tab.classList.toggle('active', active);
        tab.setAttribute('aria-selected', active ? 'true' : 'false');
        tab.tabIndex = active ? 0 : -1;
      });
      positionModeIndicator();
    }

    function hasTimerProgress() {
      return state.running || state.timeLeft !== state.totalTime;
    }

    function requestModeChange(mode) {
      if (mode === state.mode) return;
      if (hasTimerProgress() && !confirm('切换模式会重置当前计时，确定继续吗？')) return;
      setMode(mode);
    }

    function setMode(mode) {
      state.mode = mode;
      clearInterval(interval);
      interval = null;
      state.running = false;
      const durations = { focus: state.settings.focus, short: state.settings.short, long: state.settings.long };
      state.totalTime = durations[mode] * 60;
      state.timeLeft = state.totalTime;
      updateModeTabs(mode);
      $btnStart.textContent = '开始';
      $btnReset.style.display = 'none';
      const labels = { focus: '专注时间', short: '短休息', long: '长休息' };
      $timerLabel.textContent = labels[mode];
      const indicatorLabels = { focus: '专注中', short: '短休息', long: '长休息' };
      $focusIndicator.textContent = indicatorLabels[mode];
      $focusIndicator.className = 'focus-indicator' + (mode === 'short' ? ' break' : mode === 'long' ? ' long-break' : '');
      updateDisplay(true);
      saveState();
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function syncSettingsInputs() {
      Object.entries(SETTING_CONTROLS).forEach(([id, config]) => {
        const input = document.getElementById(id);
        input.value = state.settings[config.key];
      });
      $inputParticles.checked = state.settings.particles !== false;
    }

    function applyDurationSetting(id, value, options = {}) {
      const config = SETTING_CONTROLS[id];
      const input = document.getElementById(id);
      const trimmed = String(value).trim();
      const parsed = parseInt(trimmed, 10);
      const hadNumericInput = trimmed !== '' && Number.isFinite(parsed);
      const next = clamp(hadNumericInput ? parsed : config.min, config.min, config.max);
      const previous = state.settings[config.key];

      if (previous === next && String(input.value) === String(next)) {
        return;
      }

      if (options.notifyClamp && hadNumericInput && parsed !== next) {
        showToast('已调整为 ' + next + '（范围 ' + config.min + '–' + config.max + '）');
      }

      if (hasTimerProgress() && !confirm(DURATION_RESET_CONFIRM)) {
        input.value = previous;
        return;
      }

      state.settings[config.key] = next;
      input.value = next;
      setMode(SETTING_TO_MODE[id]);
      updatePomodoroDots();
    }

    function applySettingValue(id, value, options = {}) {
      if (SETTING_TO_MODE[id]) {
        applyDurationSetting(id, value, options);
        return;
      }

      const config = SETTING_CONTROLS[id];
      const input = document.getElementById(id);
      const trimmed = String(value).trim();
      const parsed = parseInt(trimmed, 10);
      const hadNumericInput = trimmed !== '' && Number.isFinite(parsed);
      const next = clamp(hadNumericInput ? parsed : config.min, config.min, config.max);

      if (state.settings[config.key] === next && String(input.value) === String(next)) {
        return;
      }

      if (options.notifyClamp && hadNumericInput && parsed !== next) {
        showToast('已调整为 ' + next + '（范围 ' + config.min + '–' + config.max + '）');
      }

      input.value = next;
      state.settings[config.key] = next;
      updatePomodoroDots();
      saveState();
    }

    function stepSetting(id, direction) {
      const input = document.getElementById(id);
      const delta = direction === '+' ? 1 : -1;
      applySettingValue(id, parseInt(input.value, 10) + delta);
    }

    function stopStepperHold() {
      if (!stepperHold) return;
      clearTimeout(stepperHold.timer);
      stepperHold = null;
    }

    function startStepperHold(button, id, direction, pointerId) {
      stopStepperHold();
      button.dataset.pointerStepped = 'true';
      stepSetting(id, direction);

      let repeatCount = 0;
      const repeat = () => {
        if (!stepperHold) return;
        repeatCount++;
        stepSetting(id, direction);
        const delay = Math.max(45, 360 * Math.pow(0.78, repeatCount));
        stepperHold.timer = setTimeout(repeat, delay);
      };

      stepperHold = { timer: setTimeout(repeat, 360) };
      if (button.setPointerCapture && pointerId != null) {
        button.setPointerCapture(pointerId);
      }
    }

    function setupStepperControls() {
      document.querySelectorAll('.stepper-btn').forEach(button => {
        const id = button.dataset.stepper;
        const direction = button.dataset.dir;

        button.addEventListener('pointerdown', e => {
          if (e.button != null && e.button !== 0) return;
          e.preventDefault();
          startStepperHold(button, id, direction, e.pointerId);
        });

        button.addEventListener('click', () => {
          if (button.dataset.pointerStepped === 'true') {
            button.dataset.pointerStepped = '';
            return;
          }
          stepSetting(id, direction);
        });

        button.addEventListener('keydown', e => {
          if (e.key !== 'Enter' && e.key !== ' ') return;
          e.preventDefault();
          stepSetting(id, direction);
        });

        button.addEventListener('pointerup', stopStepperHold);
        button.addEventListener('pointercancel', stopStepperHold);
        button.addEventListener('pointerleave', stopStepperHold);
        button.addEventListener('blur', stopStepperHold);
        button.addEventListener('contextmenu', e => e.preventDefault());
      });

      window.addEventListener('pointerup', stopStepperHold);
    }

    function setupSettingInputs() {
      Object.keys(SETTING_CONTROLS).forEach(id => {
        const input = document.getElementById(id);

        input.addEventListener('focus', function() {
          this.select();
        });

        input.addEventListener('input', function() {
          this.value = this.value.replace(/\D/g, '');
        });

        input.addEventListener('change', function() {
          if (this.dataset.skipNextChange === 'true') {
            this.dataset.skipNextChange = '';
            return;
          }
          applySettingValue(id, this.value, { notifyClamp: true });
        });

        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            e.preventDefault();
            e.target.dataset.skipNextChange = 'true';
            applySettingValue(id, e.target.value, { notifyClamp: true });
            e.target.blur();
          }
        });
      });
    }

    function start() {
      if (state.running) {
        state.running = false;
        clearInterval(interval);
        interval = null;
        $btnStart.textContent = '继续';
      } else {
        state.running = true;
        $btnStart.textContent = '暂停';
        $btnReset.style.display = 'inline-flex';
        $focusIndicator.classList.add('active');
        interval = setInterval(() => {
          state.timeLeft--;
          updateDisplay();
          if (state.timeLeft <= 0) {
            clearInterval(interval);
            interval = null;
            onTimerComplete();
          }
        }, 1000);
      }
    }

    function reset() {
      clearInterval(interval);
      interval = null;
      state.running = false;
      state.timeLeft = state.totalTime;
      $btnStart.textContent = '开始';
      $btnReset.style.display = 'none';
      $focusIndicator.classList.remove('active');
      updateDisplay(true);
    }

    function onTimerComplete() {
      state.running = false;
      $focusIndicator.classList.remove('active');
      if (state.mode === 'focus') {
        state.completedPomodoros++;
        state.pomodorosToday++;
        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        state.dailyCurve.push({ hour: now.getHours(), type: 'focus' });
        state.history.push({ date: dateStr, hour: now.getHours(), duration: 25 });
        showToast('专注完成！休息一下吧 🌱');
        saveState();
        if (state.completedPomodoros >= state.settings.pomodorosBeforeLong) {
          state.completedPomodoros = 0;
          setMode('long');
        } else {
          setMode('short');
        }
      } else {
        showToast('休息结束！继续专注 💪');
        setMode('focus');
      }
      updatePomodoroDots();
      updateStats();
    }

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      setTimeout(() => $toast.classList.remove('show'), 3500);
    }

    function updatePomodoroDots() {
      const total = state.settings.pomodorosBeforeLong;
      for (let i = 0; i < total; i++) {
        const dot = document.getElementById('dot' + i);
        if (dot) dot.classList.toggle('filled', i < state.completedPomodoros);
      }
      const label = state.completedPomodoros + 1;
      document.getElementById('pomoLabel').textContent = '第 ' + label + ' 个番茄';
    }

    function toLocalDateStr(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + d;
    }

    function getHistoryByDate(dateStr) {
      return state.history.filter(h => h.date === dateStr);
    }

    function calcStreak() {
      if (!state.history || state.history.length === 0) return 0;
      let streak = 0;
      const today = toLocalDateStr(new Date());
      let checkDate = new Date();
      while (true) {
        const checkStr = toLocalDateStr(checkDate);
        const dayData = getHistoryByDate(checkStr);
        if (dayData.length > 0) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }
      return streak;
    }

    function calcWeekPomodoros() {
      const today = new Date();
      let total = 0;
      for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        total += getHistoryByDate(toLocalDateStr(d)).length;
      }
      return total;
    }

    function calcHeatmapLevel(dots) {
      if (dots === 0) return 0;
      if (dots === 1) return 1;
      if (dots <= 2) return 2;
      if (dots <= 4) return 3;
      return 4;
    }

    function updateStats() {
      document.getElementById('statToday').textContent = state.pomodorosToday;
      document.getElementById('statWeek').textContent = calcWeekPomodoros();
      document.getElementById('statTotal').textContent = state.history.length;
      document.getElementById('statStreak').textContent = calcStreak();

      const $focusBars = document.getElementById('focusBars');
      $focusBars.innerHTML = '';
      const now = new Date();
      const hourCounts = {};
      state.dailyCurve.filter(d => d.type === 'focus').forEach(d => {
        hourCounts[d.hour] = (hourCounts[d.hour] || 0) + 1;
      });
      for (let h = 0; h < 24; h++) {
        const bar = document.createElement('div');
        bar.className = 'focus-bar';
        const count = hourCounts[h] || 0;
        if (count > 0) {
          bar.classList.add('active');
          bar.style.height = (20 + Math.min(count * 15, 60)) + 'px';
        } else {
          bar.style.height = (h === now.getHours() ? '20px' : '4px');
        }
        $focusBars.appendChild(bar);
      }

      const $heatmap = document.getElementById('heatmapGrid');
      $heatmap.innerHTML = '';
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(startDate.getDate() - 83);
      for (let week = 0; week < 12; week++) {
        for (let day = 0; day < 7; day++) {
          const cell = document.createElement('div');
          cell.className = 'heatmap-cell';
          const d = new Date(startDate);
          d.setDate(d.getDate() + (week * 7 + day));
          const dateStr = toLocalDateStr(d);
          const dots = getHistoryByDate(dateStr).length;
          const level = calcHeatmapLevel(dots);
          if (level > 0) cell.classList.add('l' + level);
          $heatmap.appendChild(cell);
        }
      }

      const tomatoTotal = state.history.length;
      const tomatoGoal = 12;
      const fillRatio = Math.min(tomatoTotal / tomatoGoal, 1);
      document.getElementById('tomatoRingFill').style.strokeDashoffset = TOMATO_CIRC * (1 - fillRatio);
      document.getElementById('tomatoCount').textContent = tomatoTotal;

      const $timeDist = document.getElementById('timeDistGrid');
      $timeDist.innerHTML = '';
      const hourTotals = {};
      state.history.forEach(h => {
        hourTotals[h.hour] = (hourTotals[h.hour] || 0) + h.duration;
      });
      const maxHour = Math.max(...Object.values(hourTotals || {}), 1);
      for (let h = 0; h < 24; h++) {
        const cell = document.createElement('div');
        cell.className = 'time-cell';
        const total = hourTotals[h] || 0;
        let level = 0;
        if (total > 0) {
          const ratio = total / maxHour;
          if (ratio > 0.75) level = 4;
          else if (ratio > 0.5) level = 3;
          else if (ratio > 0.25) level = 2;
          else level = 1;
        }
        if (level > 0) cell.classList.add('l' + level);
        $timeDist.appendChild(cell);
      }
    }

    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => requestModeChange(tab.dataset.mode));
    });

    $btnStart.addEventListener('click', start);
    $btnReset.addEventListener('click', reset);

    $btnSettings.addEventListener('click', () => {
      if (state.running) {
        showToast('请先暂停计时器');
        return;
      }
      $settingsPanel.classList.add('open');
      $overlay.classList.add('active');
    });

    $btnStats.addEventListener('click', () => {
      updateStats();
      $statsDrawer.classList.add('open');
      $overlay.classList.add('active');
    });

    function closePanels() {
      $settingsPanel.classList.remove('open');
      $statsDrawer.classList.remove('open');
      $overlay.classList.remove('active');
    }

    document.getElementById('settingsClose').addEventListener('click', closePanels);
    document.getElementById('statsClose').addEventListener('click', closePanels);
    $overlay.addEventListener('click', closePanels);

    $inputParticles.addEventListener('change', function() {
      state.settings.particles = this.checked;
      saveState();
    });

    document.getElementById('resetAllStats').addEventListener('click', () => {
      if (confirm('确定清除所有数据？')) {
        state.completedPomodoros = 0;
        state.pomodorosToday = 0;
        state.dailyCurve = [];
        state.history = [];
        saveState();
        updateStats();
        updatePomodoroDots();
        showToast('数据已清除');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        start();
      } else if (e.key === 'r' || e.key === 'R') {
        reset();
      } else if (e.key === 'Escape') {
        closePanels();
      }
    });

    loadState();
    syncSettingsInputs();
    setupStepperControls();
    setupSettingInputs();
    createParticles();
    state.timeLeft = state.settings.focus * 60;
    state.totalTime = state.settings.focus * 60;
    applyModeTheme(state.mode);
    updateDisplay();
    updatePomodoroDots();
    updateModeTabs(state.mode);
    window.addEventListener('resize', positionModeIndicator);
    $ringFill.style.strokeDasharray = CIRCUMFERENCE;
    $ringFill.style.strokeDashoffset = CIRCUMFERENCE;
  </script>
</body>
</html>
